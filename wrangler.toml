# wrangler.toml — configuración de Cloudflare Pages + D1
name       = "bethel"
pages_build_output_dir = "dist"
compatibility_date     = "2026-06-16"

[[d1_databases]]
binding      = "DB"          # nombre con el que accedes en el Worker: env.DB
database_name = "cfcb-db"
database_id  = "8367a346-2ea1-4985-b825-3e2b94a4211c"   # obtenido al crear la BD

[assets]
directory = "./dist"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1